# BuildTrack API — Nginx Reverse Proxy
# Place in /etc/nginx/sites-available/buildtrack-api
# Symlink to /etc/nginx/sites-enabled/buildtrack-api

upstream buildtrack_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name api.buildtrack.cortexbuildpro.com buildtrack-api.cortexbuildpro.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1000;

    # API proxy
    location / {
        proxy_pass http://buildtrack_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
    }

    # Health check endpoint (lightweight)
    location /health {
        proxy_pass http://buildtrack_api/health;
        access_log off;
    }
}
